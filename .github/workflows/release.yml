name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version to publish (e.g. 0.1.0). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  # Required by actions/attest-build-provenance to mint a Sigstore certificate
  # via GitHub's OIDC issuer and publish the attestation back to the repo.
  attestations: write
  id-token: write

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
    steps:
      - id: set
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          if ! echo "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "Invalid version: $v" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

  build-test:
    name: Build & Test
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release /p:MinVerVersionOverride=${{ needs.version.outputs.version }}
      - run: dotnet test --no-build --configuration Release

  pack-nuget:
    name: Pack & Push NuGet
    needs: [version, build-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Pack
        run: |
          dotnet pack src/DotnetAssemblyMcp.Server/DotnetAssemblyMcp.Server.csproj \
            -c Release \
            -o artifacts \
            /p:MinVerVersionOverride=${{ needs.version.outputs.version }}
      - name: Attest nupkg provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'artifacts/*.nupkg'
      - name: Push to NuGet.org
        run: |
          dotnet nuget push 'artifacts/*.nupkg' \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate
      - name: Upload nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg

  publish-binaries:
    name: Publish self-contained single-file binaries
    needs: [version, build-test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  rid: linux-x64,   archive: tar  }
          - { os: ubuntu-latest,  rid: linux-arm64, archive: tar  }
          - { os: windows-latest, rid: win-x64,     archive: zip  }
          - { os: windows-latest, rid: win-arm64,   archive: zip  }
          - { os: macos-latest,   rid: osx-arm64,   archive: tar  }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish ${{ matrix.rid }}
        shell: bash
        run: |
          set -euo pipefail
          out="publish/${{ matrix.rid }}"
          dotnet publish src/DotnetAssemblyMcp.Server/DotnetAssemblyMcp.Server.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -o "$out" \
            --self-contained true \
            -p:MinVerVersionOverride=${{ needs.version.outputs.version }} \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=embedded

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          set -euo pipefail
          base="dotnet-assembly-mcp-${{ needs.version.outputs.version }}-${{ matrix.rid }}"
          mkdir -p dist
          tar -C "publish/${{ matrix.rid }}" -czf "dist/${base}.tar.gz" .
          (cd dist && sha256sum "${base}.tar.gz" > "${base}.tar.gz.sha256")

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $base = "dotnet-assembly-mcp-${{ needs.version.outputs.version }}-${{ matrix.rid }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath "dist/$base.zip" -Force
          $hash = (Get-FileHash "dist/$base.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $base.zip" | Out-File -Encoding ascii "dist/$base.zip.sha256"

      - name: Attest binary archive provenance
        uses: actions/attest-build-provenance@v2
        with:
          # Attests the archive itself; the sha256 sidecar is just a convenience and
          # consumers verify the archive directly via `gh attestation verify`.
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.rid }}
          path: dist/*

  docker-ghcr:
    name: Build & Push Docker (GHCR)
    needs: [version, build-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(needs.version.outputs.version, '-') }}

      - name: Build & push (by digest, no tags)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          # Push by digest only — the version/latest tags are applied AFTER the
          # GitHub-issued SLSA attestation succeeds. Without this, a tagged image
          # would be reachable to consumers before its attestation existed, and a
          # failed attestation step would leak an unattested tag.
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MINVER_VERSION_OVERRIDE=${{ needs.version.outputs.version }}
          provenance: true
          sbom: true

      - name: Attest container image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Apply tags to attested digest
        # Promotes the digest to the human-readable version/latest tags only after
        # the attestation has been published. Tags become resolvable to consumers
        # at the same moment as the SLSA provenance they can verify against.
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          args=()
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            args+=( -t "$tag" )
          done <<< "$TAGS"
          docker buildx imagetools create "${args[@]}" "${IMAGE_NAME}@${DIGEST}"

  github-release:
    name: GitHub Release
    needs: [version, pack-nuget, publish-binaries, docker-ghcr]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: artifacts
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=v${{ needs.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/*.nupkg
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.zip
            artifacts/*.zip.sha256
